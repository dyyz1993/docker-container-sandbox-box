name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "**"
      - "!docs/**"
      - "!.github/**"
      - "!README.md"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Health check
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "Testing image: ${TAG}"
          docker pull "${TAG}"
          docker run -d --name health-test --privileged \
            -e SSH_PUBLIC_KEY="test" \
            -p 9091:80 \
            "${TAG}"
          echo "Waiting for container to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9091/ > /dev/null 2>&1; then
              echo "Health check passed!"
              docker rm -f health-test
              exit 0
            fi
            sleep 2
          done
          echo "Container logs:"
          docker logs health-test
          docker rm -f health-test
          echo "Health check failed - container may need more time, continuing anyway"
          exit 0
